name: Build AEKA Launcher for macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 

    steps:
    - name: Lay code ve
      uses: actions/checkout@v4

    - name: Cai dat Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cai dat thu vien
      run: |
        python -m pip install --upgrade pip
        # Đã nhét thêm Pillow vào đây để chữa bệnh mù mắt của PyInstaller
        pip install pyinstaller pyqt6 Pillow
        pip install -r requirements.txt

    - name: Build bang PyInstaller
      run: |
        pyinstaller --noconfirm --windowed --icon "icon.icns" --name "AEKA Launcher" launcher.py

    - name: Nen file App lai
      run: |
        cd dist
        zip -r ../AEKA_Launcher_Mac.zip "AEKA Launcher.app"

    - name: Tra hang cho sep
      uses: actions/upload-artifact@v4
      with:
        name: AEKA-macOS-Build
        path: AEKA_Launcher_Mac.zip
