name: Build AEKA Launcher for macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 

    steps:
    - name: Lay code ve
      uses: actions/checkout@v4

    - name: Cai dat Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cai dat thu vien
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyqt6
        pip install -r requirements.txt

    - name: Build bang Nuitka
      run: |
        python -m nuitka --standalone --macos-create-app-bundle --macos-app-name="AEKA Launcher" --enable-plugin=pyqt6 launcher.py

    - name: Nen file App lai
      run: |
        zip -r AEKA_Launcher_Mac.zip "AEKA Launcher.app"

    - name: Tra hang cho sep
      uses: actions/upload-artifact@v4
      with:
        name: AEKA-macOS-Build
        path: AEKA_Launcher_Mac.zip
